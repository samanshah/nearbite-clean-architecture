name: Android CI

on:
  pull_request:
    branches:
      - develop

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew

      - run: ./gradlew ktlintCheck

      - run: ./gradlew detekt

      - run: ./gradlew test